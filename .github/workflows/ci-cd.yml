name: CI/CD Pipeline

on:
  workflow_dispatch:   # Manual trigger
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies
      - run: npm ci

      # 4. Build project
      - run: npm run build || echo "No build folder generated"

      # 5. Run tests
      - run: npm test

      # 6. Security scan
      - run: npm audit --audit-level=high

      # 7. Deploy to Vercel directly
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --confirm --token $VERCEL_TOKEN

      # 8. Output deployment URL
      - name: Get deployment URL
        run: |
          DEPLOY_URL=$(npx vercel --token $VERCEL_TOKEN --prod --confirm --json | jq -r '.[0].url')
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
