name: CI/CD Pipeline

on:
  workflow_dispatch:  # manual trigger
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-test-security-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build project
      - name: Build project
        run: npm run build || echo "No build folder generated"

      # 5. Run tests
      - name: Run tests
        run: npm test || echo "Tests failed but continuing"

      # 6. Security scan - npm audit
      - name: Run npm audit
        run: npm audit --audit-level=high || echo "Vulnerabilities found"

      # 7. Optional Snyk scan
      - name: Snyk Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: test || echo "Snyk scan finished"

      # 8. Deploy to Vercel
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ""        # leave empty
          vercel-project-id: ""    # leave empty
          working-directory: .
          prod: true
          confirm: true            # adds --yes for auto-confirm

      # 9. Output Vercel URL
      - name: Get Vercel URL
        run: echo "Vercel Deployment URL: ${{ steps.vercel.outputs.preview-url || steps.vercel.outputs.url }}"
