name: CI-CD-Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Build
        run: npm run build || echo "No build script found"

      - name: Run npm audit (non-blocking)
        run: npm audit --json > audit.json || true

      - name: Run Snyk Scan (non-blocking)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Deploy to Vercel
        run: |
          npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} > deployment.txt

      - name: Extract Deployment URL
        id: extract_url
        run: |
          URL=$(grep -o 'https://.*\.vercel\.app' deployment.txt | head -n 1)
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT

      - name: Upload Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit.json
