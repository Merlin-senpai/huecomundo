name: CI-CD Pipeline

on:
  workflow_dispatch: # manual trigger
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-security:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4  # Latest major version

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4  # Latest major version
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build project
      - name: Build project
        run: npm run build

      # 5. Run tests
      - name: Run tests
        run: npm test

      # 6. Security scan: npm audit
      - name: Run npm audit
        run: npm audit --audit-level=high || true

      # 7. Optional: Snyk scan
      - name: Snyk Scan
        uses: snyk/actions/node@v1  # Use stable release
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: test

      # 8. Upload build artifacts (optional)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ./build
