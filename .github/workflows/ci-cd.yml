name: CI/CD Pipeline

on:
  workflow_dispatch:   # Manual trigger
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v4

      # 2. Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"   # ✅ Node modules caching

      # 3. Install dependencies
      - run: npm ci

      # 4. Cache build folder if it exists
      - name: Cache build
        uses: actions/cache@v3
        with:
          path: build
          key: build-${{ github.sha }}
          restore-keys: |
            build-

      # 5. Build project
      - run: npm run build || echo "No build folder generated"

      # 6. Run tests
      - run: npm test

      # 7. Security scan: npm audit (high only)
      - name: Run npm audit
        run: npm audit --audit-level=high || echo "Audit completed with issues"

      # 8. Security scan: Snyk
      - name: Snyk Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: test || true

      # 9. Deploy to Vercel directly
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --confirm --token $VERCEL_TOKEN

      # 10. Output deployment URL
      - name: Get deployment URL
        run: |
          DEPLOY_URL=$(npx vercel --token $VERCEL_TOKEN --prod --confirm --json | jq -r '.[0].url')
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
